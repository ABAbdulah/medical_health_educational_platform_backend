[build]
builder = "nixpacks"

[deploy]
preDeployCommand = "alembic upgrade head"
# Railway runs startCommand without a shell, so $PORT is not expanded.
# Hardcode the port (matches the PORT variable and the public domain target).
startCommand = "uvicorn main:app --host 0.0.0.0 --port 8080"
healthcheckPath = "/health"
healthcheckTimeout = 300
